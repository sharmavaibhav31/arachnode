<!DOCTYPE html>
<!--
  Arachnode Dashboard — single-file SPA served by FastAPI gateway at GET /
  =========================================================================
  API dependencies per view:
    Jobs:     GET /api/jobs, PATCH /api/jobs/{id}/status, POST /api/workflow/apply
    Contacts: GET /api/contacts?company=, GET /api/contacts/{job_id}
    Emails:   GET /api/emails?job_id=, PATCH /api/emails/{id}/status, POST /api/emails/{id}/send
    Stats:    GET /api/stats, GET /api/summary
    Scrape:   POST /api/scrape

  To change the backend URL: edit API_BASE constant at the top of the <script> block.

  Theme: toggled via data-theme="dark"|"light" on <html>, persisted to localStorage.
  Background: tsParticles (CDN) — GPU-accelerated, theme-aware, non-distracting.
-->
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arachnode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js" defer></script>
  <style>
    /* ============================================================
       DESIGN TOKENS — dark theme defaults
    ============================================================ */
    :root,
    [data-theme="dark"] {
      --accent: #7c5cfc;
      --accent-2: #4f9eff;
      --accent-low: rgba(124, 92, 252, .12);
      --accent-glow: rgba(124, 92, 252, .25);
      --bg: #0a0a0f;
      --bg-2: #0f0f18;
      --surface: #13131f;
      --surface-2: #1a1a2e;
      --border: rgba(255, 255, 255, .08);
      --border-hover: rgba(255, 255, 255, .16);
      --text: #e8e8f0;
      --text-dim: #a0a0b8;
      --muted: #5a5a78;
      --green: #22c55e;
      --green-low: rgba(34, 197, 94, .12);
      --amber: #f59e0b;
      --amber-low: rgba(245, 158, 11, .12);
      --red: #ef4444;
      --red-low: rgba(239, 68, 68, .12);
      --blue: #3b82f6;
      --blue-low: rgba(59, 130, 246, .12);
      --radius: 10px;
      --radius-sm: 6px;
      --n-h: 54px;
      --trans: 200ms cubic-bezier(.4,0,.2,1);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --shadow: 0 4px 24px rgba(0,0,0,.4);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.3);
      --glass: rgba(19, 19, 31, .8);
      --glass-border: rgba(255,255,255,.06);
      --particle-color: #7c5cfc;
    }

    [data-theme="light"] {
      --accent: #6c47ff;
      --accent-2: #2563eb;
      --accent-low: rgba(108, 71, 255, .08);
      --accent-glow: rgba(108, 71, 255, .15);
      --bg: #f8f7ff;
      --bg-2: #f0eeff;
      --surface: #ffffff;
      --surface-2: #f3f0ff;
      --border: rgba(0, 0, 0, .08);
      --border-hover: rgba(0, 0, 0, .16);
      --text: #0f0f1a;
      --text-dim: #4a4a6a;
      --muted: #8a8aaa;
      --green: #16a34a;
      --green-low: rgba(22, 163, 74, .08);
      --amber: #d97706;
      --amber-low: rgba(217, 119, 6, .08);
      --red: #dc2626;
      --red-low: rgba(220, 38, 38, .08);
      --blue: #2563eb;
      --blue-low: rgba(37, 99, 235, .08);
      --shadow: 0 4px 24px rgba(108,71,255,.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
      --glass: rgba(255, 255, 255, .85);
      --glass-border: rgba(108,71,255,.1);
      --particle-color: #6c47ff;
    }

    /* ============================================================
       GLOBAL RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      /* Smooth theme transitions on everything */
      transition:
        background-color var(--trans),
        color var(--trans);
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      transition:
        background-color var(--trans),
        color var(--trans);
    }

    button { cursor: pointer; font: inherit; border: none; background: none; }
    input, select { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ============================================================
       PARTICLES BACKGROUND
    ============================================================ */
    #tsparticles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Everything above particles */
    #navbar, #main, #detail-panel, #panel-backdrop,
    .modal-backdrop, #toasts, #offline-banner {
      position: relative;
      z-index: 10;
    }

    /* ============================================================
       NAVBAR
    ============================================================ */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--n-h);
      background: var(--glass);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
      gap: 16px;
      transition: background var(--trans), border-color var(--trans);
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .brand-name { color: var(--text); }
    .brand-name em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-tabs {
      display: flex;
      gap: 0;
      margin-left: 20px;
    }

    .nav-tab {
      padding: 0 16px;
      height: var(--n-h);
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color var(--trans), border-color var(--trans);
    }

    .nav-tab:hover { color: var(--text-dim); }

    .nav-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .nav-left { display: flex; align-items: center; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Theme toggle */
    #btn-theme {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    #btn-theme:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-low);
    }

    #btn-scrape {
      padding: 7px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      transition: opacity var(--trans), box-shadow var(--trans);
      box-shadow: 0 0 0 rgba(124,92,252,0);
    }

    #btn-scrape:hover {
      opacity: .9;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ============================================================
       OFFLINE BANNER
    ============================================================ */
    #offline-banner {
      display: none;
      position: fixed;
      top: var(--n-h);
      left: 0; right: 0;
      z-index: 190;
      background: var(--amber-low);
      border-bottom: 1px solid var(--amber);
      padding: 10px 24px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--amber);
    }

    #offline-banner.show { display: flex; }

    /* ============================================================
       MAIN CONTENT
    ============================================================ */
    #main {
      margin-top: var(--n-h);
      padding: 24px;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-view { display: none; }
    .tab-view.active { display: block; }

    /* ============================================================
       FILTER BAR
    ============================================================ */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }

    .filter-bar input,
    .filter-bar select {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 13px;
      outline: none;
      transition: border-color var(--trans), background var(--trans), box-shadow var(--trans);
      color: var(--text);
    }

    .filter-bar input:focus,
    .filter-bar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-low);
    }

    .filter-bar input { flex: 1; min-width: 180px; }

    .filter-bar select option {
      background: var(--surface);
      color: var(--text);
    }

    .btn-outline {
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--text-dim);
      transition: all var(--trans);
    }

    .btn-outline:hover {
      background: var(--surface-2);
      border-color: var(--border-hover);
      color: var(--text);
    }

    .btn-accent {
      height: 36px;
      padding: 0 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      transition: opacity var(--trans), box-shadow var(--trans);
    }

    .btn-accent:hover {
      opacity: .9;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    /* ============================================================
       JOB CARD GRID
    ============================================================ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width:1024px) { .card-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:640px)  { .card-grid { grid-template-columns: 1fr; } }

    .job-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px;
      cursor: pointer;
      transition: all var(--trans);
      position: relative;
      border-left: 3px solid var(--border);
      overflow: hidden;
    }

    .job-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-low) 0%, transparent 60%);
      opacity: 0;
      transition: opacity var(--trans);
      pointer-events: none;
    }

    .job-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .job-card:hover::before { opacity: 1; }

    .job-card.status-new    { border-left-color: var(--amber); }
    .job-card.status-applied { border-left-color: var(--green); }
    .job-card.status-ignored { border-left-color: var(--red); }

    .card-company {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--text);
    }

    .card-role {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
      min-height: 22px;
    }

    .tag {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 99px;
      background: var(--accent-low);
      color: var(--accent);
      font-weight: 500;
      border: 1px solid rgba(124,92,252,.15);
    }

    .tag-gray {
      background: var(--surface-2);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .card-actions {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity var(--trans);
    }

    .job-card:hover .card-actions { opacity: 1; }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 13px;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* ============================================================
       SKELETON / SHIMMER
    ============================================================ */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    [data-theme="dark"] .skel {
      background: linear-gradient(90deg, #1a1a2e 25%, #22223a 50%, #1a1a2e 75%);
      background-size: 800px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }

    [data-theme="light"] .skel {
      background: linear-gradient(90deg, #ece9ff 25%, #ddd9ff 50%, #ece9ff 75%);
      background-size: 800px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }

    .skel-card { height: 148px; border-radius: var(--radius); }
    .skel-row  { height: 44px; border-radius: 4px; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ============================================================
       TABLE
    ============================================================ */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead { background: var(--surface-2); }

    th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    th:hover { color: var(--text-dim); }

    th .sort-icon { margin-left: 4px; font-size: 10px; opacity: .5; }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td {
      background: var(--surface-2);
    }

    tbody tr.expanded-parent td { background: var(--surface-2); }

    .expand-row td {
      background: var(--surface);
      padding: 14px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }

    /* ============================================================
       BADGES
    ============================================================ */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 99px;
      letter-spacing: .02em;
    }

    .badge-green  { background: var(--green-low);  color: var(--green); }
    .badge-amber  { background: var(--amber-low);  color: var(--amber); }
    .badge-red    { background: var(--red-low);    color: var(--red); }
    .badge-blue   { background: var(--blue-low);   color: var(--blue); }
    .badge-gray   { background: var(--surface-2);  color: var(--text-dim); border: 1px solid var(--border); }
    .badge-purple { background: var(--accent-low); color: var(--accent); }

    /* ============================================================
       DETAIL PANEL
    ============================================================ */
    #detail-panel {
      position: fixed;
      top: var(--n-h); right: 0; bottom: 0;
      width: 420px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-left: 1px solid var(--glass-border);
      overflow-y: auto;
      z-index: 150;
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(.4,0,.2,1);
    }

    #detail-panel.open { transform: translateX(0); }

    #panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 140;
      background: rgba(0,0,0,.3);
      backdrop-filter: blur(2px);
    }

    #panel-backdrop.open { display: block; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--glass);
      backdrop-filter: blur(20px);
      z-index: 1;
    }

    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section h4 {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 12px;
    }

    .detail-field {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .detail-label {
      color: var(--muted);
      min-width: 80px;
      flex-shrink: 0;
    }

    /* ============================================================
       STATS / METRICS
    ============================================================ */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    @media (max-width:900px) { .metric-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:480px) { .metric-grid { grid-template-columns: 1fr 1fr; } }

    .metric-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: all var(--trans);
    }

    .metric-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0;
      transition: opacity var(--trans);
    }

    .metric-card:hover::after { opacity: 1; }
    .metric-card:hover { border-color: var(--border-hover); }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.02em;
    }

    .metric-trend {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .chart-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .chart-wrap h4 {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 16px;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .summary-card h4 {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .summary-row:last-child { border-bottom: none; }
    .summary-row span:first-child { color: var(--text-dim); }

    /* ============================================================
       MODAL
    ============================================================ */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow);
      animation: modalIn .18s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(.94) translateY(8px); }
    }

    .modal-header {
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-body { padding: 20px; }

    .field-group { margin-bottom: 16px; }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .field-group input,
    .field-group select {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: all var(--trans);
    }

    .field-group input:focus,
    .field-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-low);
    }

    .modal-footer {
      padding: 0 20px 20px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-close-x {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: all var(--trans);
    }

    .btn-close-x:hover {
      background: var(--red-low);
      border-color: var(--red);
      color: var(--red);
    }

    /* ============================================================
       TOASTS
    ============================================================ */
    #toasts {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 400;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      max-width: 320px;
      box-shadow: var(--shadow);
      border-left: 3px solid var(--muted);
      animation: toastIn .2s cubic-bezier(.34,1.56,.64,1);
      pointer-events: auto;
      color: var(--text);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(.96); }
    }

    .toast.info    { border-left-color: var(--accent); }
    .toast.success { border-left-color: var(--green); }
    .toast.error   { border-left-color: var(--red); }

    .toast.fade-out {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s ease, transform .3s ease;
    }

    /* ============================================================
       SCROLLBAR
    ============================================================ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ============================================================
       MOBILE NAV
    ============================================================ */
    @media (max-width: 600px) {
      .nav-tabs { margin-left: 8px; }
      .nav-tab  { padding: 0 10px; font-size: 12px; }
      .brand-name { display: none; }
    }
  </style>
</head>

<body>

  <!-- PARTICLES BACKGROUND -->
  <div id="tsparticles"></div>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-left">
      <div class="brand">
        <div class="brand-icon">🕸</div>
        <span class="brand-name">Arach<em>node</em></span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="jobs">Jobs</button>
        <button class="nav-tab" data-tab="contacts">Contacts</button>
        <button class="nav-tab" data-tab="emails">Emails</button>
        <button class="nav-tab" data-tab="stats">Stats</button>
      </div>
    </div>
    <div class="nav-right">
      <button id="btn-theme" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <button id="btn-scrape">▶ Trigger Scrape</button>
    </div>
  </nav>

  <!-- OFFLINE BANNER -->
  <div id="offline-banner">
    <span>⚠ Cannot reach backend — is the gateway running?</span>
    <button class="btn-outline" style="height:26px;font-size:12px" id="btn-dismiss-banner">Dismiss</button>
  </div>

  <!-- MAIN -->
  <div id="main" style="margin-top:calc(var(--n-h) + 24px)">

    <!-- JOBS TAB -->
    <section id="tab-jobs" class="tab-view active">
      <div class="filter-bar">
        <input type="text" id="job-search" placeholder="Search company or role…" />
        <select id="job-status-filter">
          <option value="all">All statuses</option>
          <option value="new">New</option>
          <option value="applied">Applied</option>
          <option value="ignored">Ignored</option>
        </select>
        <select id="job-stack-filter">
          <option value="all">All stacks</option>
        </select>
        <button class="btn-outline" id="btn-refresh-jobs">Refresh</button>
      </div>
      <div id="jobs-grid" class="card-grid"></div>
    </section>

    <!-- CONTACTS TAB -->
    <section id="tab-contacts" class="tab-view">
      <div class="filter-bar">
        <input type="text" id="contact-search" placeholder="Filter by company…" />
        <button class="btn-outline" id="btn-refresh-contacts">Refresh</button>
      </div>
      <div id="contacts-table-wrap" class="table-wrap">
        <table id="contacts-table">
          <thead>
            <tr>
              <th data-col="name">Name <span class="sort-icon"></span></th>
              <th data-col="email">Email <span class="sort-icon"></span></th>
              <th data-col="role">Role <span class="sort-icon"></span></th>
              <th data-col="company">Company <span class="sort-icon"></span></th>
              <th data-col="verified">Verified <span class="sort-icon"></span></th>
              <th data-col="created_at">Added <span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="contacts-body"></tbody>
        </table>
      </div>
    </section>

    <!-- EMAILS TAB -->
    <section id="tab-emails" class="tab-view">
      <div id="emails-table-wrap" class="table-wrap">
        <table id="emails-table">
          <thead>
            <tr>
              <th>Company / Role</th>
              <th>Contact</th>
              <th>Template</th>
              <th>Status</th>
              <th>Generated</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="emails-body"></tbody>
        </table>
      </div>
    </section>

    <!-- STATS TAB -->
    <section id="tab-stats" class="tab-view">
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">Total Jobs</div>
          <div class="metric-value" id="s-total">—</div>
          <div class="metric-trend" id="s-total-t"></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Applied</div>
          <div class="metric-value" id="s-applied" style="color:var(--green)">—</div>
          <div class="metric-trend" id="s-applied-t"></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Contacts Found</div>
          <div class="metric-value" id="s-contacts" style="color:var(--accent)">—</div>
          <div class="metric-trend" id="s-contacts-t"></div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Emails Drafted</div>
          <div class="metric-value" id="s-emails" style="color:var(--blue)">—</div>
          <div class="metric-trend" id="s-emails-t"></div>
        </div>
      </div>
      <div class="chart-wrap">
        <h4>Jobs by Source</h4>
        <canvas id="source-chart" height="120"></canvas>
      </div>
      <div class="summary-card">
        <h4>Last Pipeline Run</h4>
        <div id="summary-content">
          <div class="empty">
            <div class="empty-icon">🕐</div>
            <p>No run summary yet.</p>
          </div>
        </div>
      </div>
    </section>

  </div><!-- #main -->

  <!-- DETAIL PANEL -->
  <div id="panel-backdrop"></div>
  <aside id="detail-panel">
    <div class="panel-header">
      <div>
        <div id="panel-company" style="font-size:16px;font-weight:600;color:var(--text)"></div>
        <div id="panel-role" style="font-size:13px;color:var(--text-dim);margin-top:3px"></div>
      </div>
      <button class="btn-close-x" id="panel-close">✕</button>
    </div>
    <div id="panel-content"></div>
  </aside>

  <!-- SCRAPE MODAL -->
  <div class="modal-backdrop" id="scrape-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Trigger Scrape</h3>
        <button class="btn-close-x" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label>Role</label>
          <input type="text" id="scrape-role" value="Backend Engineer" />
        </div>
        <div class="field-group">
          <label>Stack (comma-separated)</label>
          <input type="text" id="scrape-stack" value="Python,Go,FastAPI" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" id="modal-cancel">Cancel</button>
        <button class="btn-accent" id="modal-submit">Start Scraping</button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toasts"></div>

  <script>
    // ===========================================================================
    // THEME SYSTEM
    // ===========================================================================
    const THEME_KEY = 'arachnode-theme';
    const ICONS = { dark: '🌙', light: '☀️' };

    function getTheme() {
      return localStorage.getItem(THEME_KEY) ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('btn-theme').textContent = ICONS[theme === 'dark' ? 'light' : 'dark'];
      localStorage.setItem(THEME_KEY, theme);
      // Re-render chart with new colors if it exists
      if (state?.chart) {
        state.chart.options.scales.x.grid.color = getComputedStyle(document.documentElement)
          .getPropertyValue('--border').trim();
        state.chart.options.scales.y.grid.color = getComputedStyle(document.documentElement)
          .getPropertyValue('--border').trim();
        state.chart.update();
      }
      // Re-init particles with new color
      initParticles(theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    // Apply saved theme immediately (before any render)
    applyTheme(getTheme());

    // ===========================================================================
    // PARTICLES BACKGROUND
    // ===========================================================================
    let particlesInstance = null;

    function getParticlesConfig(theme) {
      const isDark = theme === 'dark';
      const color = isDark ? '#7c5cfc' : '#6c47ff';
      const linkColor = isDark ? '#4f9eff' : '#2563eb';
      const opacity = isDark ? 0.35 : 0.2;
      const linkOpacity = isDark ? 0.15 : 0.08;

      return {
        fullScreen: { enable: false },
        background: { color: { value: 'transparent' } },
        fpsLimit: 60,
        particles: {
          number: {
            value: window.innerWidth < 768 ? 30 : 60,
            density: { enable: true, area: 900 },
          },
          color: { value: color },
          shape: { type: 'circle' },
          opacity: {
            value: opacity,
            animation: { enable: true, speed: 0.6, minimumValue: 0.05, sync: false },
          },
          size: {
            value: { min: 1, max: 2.5 },
            animation: { enable: true, speed: 1.2, minimumValue: 0.5, sync: false },
          },
          links: {
            enable: true,
            color: linkColor,
            distance: 160,
            opacity: linkOpacity,
            width: 1,
          },
          move: {
            enable: true,
            speed: 0.6,
            direction: 'none',
            random: true,
            straight: false,
            outModes: { default: 'bounce' },
            attract: { enable: false },
          },
        },
        interactivity: {
          detectsOn: 'window',
          events: {
            onHover: { enable: true, mode: 'grab' },
            resize: true,
          },
          modes: {
            grab: {
              distance: 120,
              links: { opacity: isDark ? 0.4 : 0.2 },
            },
          },
        },
        detectRetina: true,
      };
    }

    async function initParticles(theme) {
      // Wait for tsParticles to be available
      if (typeof tsParticles === 'undefined') return;
      // Destroy old instance
      if (particlesInstance) {
        await particlesInstance.destroy();
        particlesInstance = null;
      }
      try {
        particlesInstance = await tsParticles.load('tsparticles', getParticlesConfig(theme || getTheme()));
      } catch (e) {
        console.warn('tsParticles failed to load:', e);
      }
    }

    // Init particles after scripts load
    window.addEventListener('load', () => {
      initParticles(getTheme());
    });

    // ===========================================================================
    // CONFIGURATION
    // ===========================================================================
    const API_BASE = ''; // change if backend is on a different host
    const API = (p) => `${API_BASE}/api${p}`;

    // === STATE ===
    const state = {
      jobs: [],
      contacts: {},
      emails: {},
      stats: null,
      summary: null,
      activeTab: 'jobs',
      selectedJobId: null,
      filters: { search: '', status: 'all', stack: 'all' },
      contactSort: { col: 'company', dir: 1 },
      chart: null,
    };

    // ===========================================================================
    // API
    // ===========================================================================
    async function apiFetch(path, opts = {}) {
      const url = API(path);
      const method = opts.method || 'GET';
      const options = {
        method,
        headers: { 'Content-Type': 'application/json', ...opts.headers },
      };
      if (opts.body) options.body = JSON.stringify(opts.body);
      try {
        const res = await fetch(url, options);
        hideBanner();
        if (!res.ok) {
          let msg = `HTTP ${res.status}`;
          try { const err = await res.json(); msg = err.detail || JSON.stringify(err); } catch {}
          toast(msg, 'error');
          return null;
        }
        if (res.status === 204) return true;
        return await res.json();
      } catch (e) {
        showBanner();
        toast(`Network error: ${e.message}`, 'error');
        return null;
      }
    }

    // ===========================================================================
    // COMPONENTS
    // ===========================================================================

    function toast(msg, type = 'info', duration = 4000) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => {
        el.classList.add('fade-out');
        setTimeout(() => el.remove(), 350);
      }, duration);
    }

    function showBanner() { document.getElementById('offline-banner').classList.add('show'); }
    function hideBanner() { document.getElementById('offline-banner').classList.remove('show'); }

    function skelCards(n = 6) {
      return Array.from({ length: n }, () => `<div class="skel skel-card"></div>`).join('');
    }

    function skelRows(n = 5, cols = 6) {
      return Array.from({ length: n }, () =>
        `<tr>${Array.from({ length: cols }, () =>
          `<td><div class="skel skel-row"></div></td>`).join('')}</tr>`
      ).join('');
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function relTime(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 2)  return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    }

    function verifiedBadge(v) {
      if (v === 'verified') return `<span class="badge badge-green">Verified</span>`;
      if (v === 'invalid')  return `<span class="badge badge-red">Invalid</span>`;
      return `<span class="badge badge-amber">Unverified</span>`;
    }

    function statusBadge(s) {
      const map = {
        draft: 'badge-gray', sent: 'badge-blue', replied: 'badge-green',
        new: 'badge-amber', applied: 'badge-green', ignored: 'badge-red'
      };
      return `<span class="badge ${map[s] || 'badge-gray'}">${esc(s)}</span>`;
    }

    function copyText(text) {
      navigator.clipboard?.writeText(text).then(() => toast('Copied!', 'success'));
    }

    // ===========================================================================
    // VIEWS: JOBS
    // ===========================================================================
    async function loadJobs(force = false) {
      if (state.jobs.length && !force) { renderJobs(); return; }
      document.getElementById('jobs-grid').innerHTML =
        `<div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:14px">${skelCards(6)}</div>`;
      const data = await apiFetch('/jobs?limit=200');
      if (!data) {
        document.getElementById('jobs-grid').innerHTML =
          `<div class="empty" style="grid-column:1/-1">
            <div class="empty-icon">⚠</div>
            <p>Failed to load jobs. <button class="btn-outline" onclick="loadJobs(true)">Retry</button></p>
          </div>`;
        return;
      }
      state.jobs = Array.isArray(data) ? data : (data.jobs || []);
      populateStackFilter();
      renderJobs();
    }

    function populateStackFilter() {
      const tags = new Set(state.jobs.flatMap(j => j.stack || []));
      const sel = document.getElementById('job-stack-filter');
      const cur = sel.value;
      while (sel.options.length > 1) sel.remove(1);
      [...tags].sort().forEach(t => {
        const o = new Option(t, t);
        if (t === cur) o.selected = true;
        sel.add(o);
      });
    }

    function filteredJobs() {
      const { search, status, stack } = state.filters;
      return state.jobs.filter(j => {
        const q = search.toLowerCase();
        const matchQ = !q || j.company?.toLowerCase().includes(q) || j.role?.toLowerCase().includes(q);
        const matchS = status === 'all' || j.status === status;
        const matchT = stack === 'all' || (j.stack || []).includes(stack);
        return matchQ && matchS && matchT;
      });
    }

    function renderJobs() {
      const jobs = filteredJobs();
      const grid = document.getElementById('jobs-grid');
      if (!jobs.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <p>No jobs found. Trigger a scrape to get started.</p>
        </div>`;
        return;
      }
      grid.innerHTML = jobs.map(j => `
        <div class="job-card status-${esc(j.status || 'new')}" data-id="${esc(j.id)}">
          <div class="card-actions">
            <button class="icon-btn" data-action="discover" data-id="${esc(j.id)}" title="Find contacts">👤</button>
            <button class="icon-btn" data-action="draft"   data-id="${esc(j.id)}" title="Draft email">✉</button>
            <button class="icon-btn" data-action="apply"   data-id="${esc(j.id)}" title="Mark applied">✓</button>
          </div>
          <div class="card-company">${esc(j.company)}</div>
          <div class="card-role">${esc(j.role)}</div>
          <div class="card-tags">
            ${(j.stack || []).slice(0,5).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
          <div class="card-footer">
            <span class="tag tag-gray">${esc(j.source || '—')}</span>
            <span>${relTime(j.posted_at)}</span>
          </div>
        </div>`).join('');
    }

    async function discoverForJob(jobId) {
      const job = state.jobs.find(j => j.id === jobId);
      if (!job) return;
      toast(`Discovering contacts for ${job.company}…`, 'info');
      const r = await apiFetch('/workflow/apply', { method: 'POST', body: { job_id: jobId, template: 'cold_outreach' } });
      if (r) toast(`Workflow triggered for ${job.company}`, 'success');
    }

    async function draftForJob(jobId) {
      const job = state.jobs.find(j => j.id === jobId);
      if (!job) return;
      toast('Generating draft email…', 'info');
      const r = await apiFetch('/workflow/apply', { method: 'POST', body: { job_id: jobId, template: 'cold_outreach' } });
      if (r?.draft_email) {
        openDetailPanel(jobId);
        toast('Draft generated — see panel', 'success');
      }
    }

    async function markApplied(jobId) {
      const r = await apiFetch(`/jobs/${jobId}/status`, { method: 'PATCH', body: { status: 'applied' } });
      if (r !== null) {
        const j = state.jobs.find(x => x.id === jobId);
        if (j) j.status = 'applied';
        renderJobs();
        toast('Marked as applied!', 'success');
      }
    }

    // === DETAIL PANEL ===
    function openDetailPanel(jobId) {
      const job = state.jobs.find(j => j.id === jobId);
      if (!job) return;
      state.selectedJobId = jobId;
      document.getElementById('panel-company').textContent = job.company;
      document.getElementById('panel-role').textContent = job.role;
      document.getElementById('detail-panel').classList.add('open');
      document.getElementById('panel-backdrop').classList.add('open');
      renderPanelContent(job);
      fetchPanelData(job);
    }

    function renderPanelContent(job) {
      document.getElementById('panel-content').innerHTML = `
        <div class="panel-section">
          <h4>Details</h4>
          <div class="detail-field"><span class="detail-label">Source</span><span>${esc(job.source || '—')}</span></div>
          <div class="detail-field"><span class="detail-label">Status</span>${statusBadge(job.status)}</div>
          <div class="detail-field"><span class="detail-label">Location</span><span>${esc(job.location || '—')}</span></div>
          <div class="detail-field"><span class="detail-label">Posted</span><span>${fmtDate(job.posted_at)}</span></div>
          ${job.url ? `<div class="detail-field"><span class="detail-label">URL</span>
            <a href="${esc(job.url)}" target="_blank" style="color:var(--accent)">Open ↗</a></div>` : ''}
        </div>
        <div class="panel-section" id="panel-contacts-section">
          <h4>Contacts</h4><div class="skel skel-row"></div>
        </div>
        <div class="panel-section" id="panel-emails-section">
          <h4>Emails</h4><div class="skel skel-row"></div>
        </div>`;
    }

    async function fetchPanelData(job) {
      const [contacts, emails] = await Promise.all([
        apiFetch(`/contacts/${job.id}`),
        apiFetch(`/emails?job_id=${job.id}`),
      ]);

      const cSect = document.getElementById('panel-contacts-section');
      if (cSect) {
        if (!contacts?.length) {
          cSect.innerHTML = '<h4>Contacts</h4><p style="font-size:13px;color:var(--muted)">No contacts discovered yet.</p>';
        } else {
          cSect.innerHTML = `<h4>Contacts</h4>${contacts.map(c => `
            <div style="margin-bottom:10px;font-size:13px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2)">
              <div style="font-weight:500;margin-bottom:2px">${esc(c.name || '—')}</div>
              <div style="color:var(--text-dim)">${esc(c.email || '—')} · ${verifiedBadge(c.verified)}</div>
            </div>`).join('')}`;
        }
      }

      const eSect = document.getElementById('panel-emails-section');
      if (eSect) {
        const tmplSel = `<select id="panel-tmpl" style="height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;margin-right:6px;background:var(--surface);color:var(--text)">
          <option value="cold_outreach">Cold Outreach</option>
          <option value="recruiter_outreach">Recruiter</option>
          <option value="followup">Follow-up</option>
        </select>`;
        if (!emails?.length) {
          eSect.innerHTML = `<h4>Emails</h4>
            <p style="font-size:13px;color:var(--muted);margin-bottom:12px">No emails drafted yet.</p>
            ${tmplSel}
            <button class="btn-accent" id="panel-draft-btn" style="height:32px;font-size:12px">Draft Email</button>`;
        } else {
          eSect.innerHTML = `<h4>Emails</h4>
            ${emails.map(e => `
              <div style="margin-bottom:8px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);font-size:12px">
                <div style="font-weight:500;margin-bottom:4px;color:var(--text)">${esc(e.subject)}</div>
                <div style="color:var(--muted)">${esc(e.template)} · ${statusBadge(e.status)}</div>
              </div>`).join('')}
            <div style="margin-top:10px">${tmplSel}
            <button class="btn-accent" id="panel-draft-btn" style="height:32px;font-size:12px">Draft New</button></div>`;
        }
        document.getElementById('panel-draft-btn')?.addEventListener('click', async () => {
          const tmpl = document.getElementById('panel-tmpl')?.value || 'cold_outreach';
          toast('Generating…', 'info');
          const r = await apiFetch('/workflow/apply', { method: 'POST', body: { job_id: job.id, template: tmpl } });
          if (r) { toast('Draft created!', 'success'); fetchPanelData(job); }
        });
      }
    }

    function closePanel() {
      document.getElementById('detail-panel').classList.remove('open');
      document.getElementById('panel-backdrop').classList.remove('open');
      state.selectedJobId = null;
    }

    // ===========================================================================
    // VIEWS: CONTACTS
    // ===========================================================================
    async function loadContacts(force = false) {
      const q = document.getElementById('contact-search').value.trim();
      const cacheKey = q || '__all__';
      if (state.contacts[cacheKey] && !force) { renderContacts(state.contacts[cacheKey]); return; }
      document.getElementById('contacts-body').innerHTML = skelRows(5, 6);
      const url = q ? `/contacts?company=${encodeURIComponent(q)}` : '/contacts?company=';
      const data = await apiFetch(url);
      if (!data) {
        document.getElementById('contacts-body').innerHTML =
          `<tr><td colspan="6"><div class="empty"><p>Failed to load. <button class="btn-outline" onclick="loadContacts(true)">Retry</button></p></div></td></tr>`;
        return;
      }
      state.contacts[cacheKey] = Array.isArray(data) ? data : [];
      renderContacts(state.contacts[cacheKey]);
    }

    function sortContacts(rows) {
      const { col, dir } = state.contactSort;
      return [...rows].sort((a, b) => String(a[col] ?? '').localeCompare(String(b[col] ?? '')) * dir);
    }

    function renderContacts(rows) {
      const sorted = sortContacts(rows);
      document.querySelectorAll('#contacts-table th .sort-icon').forEach(el => el.textContent = '');
      const th = document.querySelector(`#contacts-table th[data-col="${state.contactSort.col}"] .sort-icon`);
      if (th) th.textContent = state.contactSort.dir === 1 ? '↑' : '↓';

      if (!sorted.length) {
        document.getElementById('contacts-body').innerHTML =
          `<tr><td colspan="6"><div class="empty"><div class="empty-icon">👤</div><p>No contacts discovered yet.</p></div></td></tr>`;
        return;
      }
      document.getElementById('contacts-body').innerHTML = sorted.map((c, i) => `
        <tr class="contact-row" data-idx="${i}" style="cursor:pointer">
          <td>${esc(c.name || '—')}</td>
          <td>${esc(c.email || '—')}</td>
          <td>${esc(c.role || '—')}</td>
          <td>${esc(c.company)}</td>
          <td>${verifiedBadge(c.verified)}</td>
          <td>${relTime(c.created_at)}</td>
        </tr>
        <tr id="cexpand-${i}" style="display:none">
          <td colspan="6" class="expand-row">
            <strong>Source:</strong> ${esc(c.source || '—')} &nbsp;&nbsp;
            ${c.email ? `<button class="btn-outline" style="height:26px;font-size:12px" onclick="copyText('${esc(c.email)}')">Copy email</button>` : ''}
          </td>
        </tr>`).join('');
    }

    // ===========================================================================
    // VIEWS: EMAILS
    // ===========================================================================
    async function loadEmails(force = false) {
      const jobs = state.jobs.slice(0, 50);
      if (!jobs.length) { await loadJobs(false); return; }

      document.getElementById('emails-body').innerHTML = skelRows(5, 6);
      const allEmails = [];
      await Promise.all(jobs.map(async j => {
        if (state.emails[j.id] && !force) {
          allEmails.push(...state.emails[j.id].map(e => ({ ...e, _job: j })));
          return;
        }
        const data = await apiFetch(`/emails?job_id=${j.id}`);
        if (data?.length) {
          state.emails[j.id] = data;
          allEmails.push(...data.map(e => ({ ...e, _job: j })));
        }
      }));

      allEmails.sort((a, b) => new Date(b.generated_at) - new Date(a.generated_at));

      if (!allEmails.length) {
        document.getElementById('emails-body').innerHTML =
          `<tr><td colspan="6"><div class="empty"><div class="empty-icon">✉</div><p>No emails drafted. Click 'Draft email' on a job card.</p></div></td></tr>`;
        return;
      }

      document.getElementById('emails-body').innerHTML = allEmails.map((e, i) => `
        <tr class="email-row" data-i="${i}">
          <td>
            <div style="font-weight:500;color:var(--text)">${esc(e._job?.company || '—')}</div>
            <div style="font-size:12px;color:var(--text-dim)">${esc(e._job?.role || '—')}</div>
          </td>
          <td style="font-size:12px;color:var(--muted)">${esc(e.contact_id?.slice(0,8) || '—')}…</td>
          <td><span class="badge badge-gray">${esc(e.template)}</span></td>
          <td>${statusBadge(e.status)}</td>
          <td style="font-size:12px;color:var(--muted)">${relTime(e.generated_at)}</td>
          <td style="display:flex;gap:6px">
            <button class="icon-btn email-view-btn" data-i="${i}" title="View">👁</button>
            <button class="icon-btn email-send-btn" data-id="${esc(e.id)}" data-i="${i}" title="Send">📤</button>
          </td>
        </tr>
        <tr id="eexpand-${i}" style="display:none">
          <td colspan="6" class="expand-row">
            <div style="margin-bottom:6px"><strong>Subject:</strong> ${esc(e.subject)}</div>
            <div style="white-space:pre-wrap;margin-bottom:10px">${esc(e.body)}</div>
            <button class="btn-outline" style="height:26px;font-size:12px" onclick="copyText(${JSON.stringify(e.body || '')})">Copy to clipboard</button>
          </td>
        </tr>`).join('');

      window._emailRows = allEmails;
    }

    async function sendEmail(emailId, rowIdx) {
      const r = await apiFetch(`/emails/${emailId}/send`, { method: 'POST' });
      if (r) {
        toast('Email sent!', 'success');
        const row = document.querySelector(`.email-row[data-i="${rowIdx}"]`);
        if (row) {
          const cells = row.querySelectorAll('td');
          if (cells[3]) cells[3].innerHTML = statusBadge('sent');
        }
      }
    }

    // ===========================================================================
    // VIEWS: STATS
    // ===========================================================================
    async function loadStats(force = false) {
      if (state.stats && !force) { renderStats(); return; }
      const [stats, summary] = await Promise.all([apiFetch('/stats'), apiFetch('/summary')]);
      state.stats = stats;
      state.summary = summary;
      renderStats();
    }

    function getChartColors() {
      const style = getComputedStyle(document.documentElement);
      return {
        bg: style.getPropertyValue('--accent').trim(),
        grid: style.getPropertyValue('--border').trim(),
        text: style.getPropertyValue('--muted').trim(),
      };
    }

    function renderStats() {
      const stats = state.stats || {};
      const sum   = state.summary || {};
      const byStatus = stats.by_status || {};
      const bySource = stats.by_source || {};

      const total = Object.values(byStatus).reduce((a,b) => a+b, 0);
      document.getElementById('s-total').textContent    = total || '—';
      document.getElementById('s-applied').textContent  = byStatus.applied ?? '—';
      document.getElementById('s-contacts').textContent = sum.contacts_found ?? '—';
      document.getElementById('s-emails').textContent   = sum.emails_drafted ?? '—';

      const labels = Object.keys(bySource);
      const values = Object.values(bySource);
      const canvas = document.getElementById('source-chart');
      const colors = getChartColors();

      if (labels.length) {
        if (state.chart) state.chart.destroy();
        state.chart = new Chart(canvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Jobs',
              data: values,
              backgroundColor: 'rgba(124,92,252,.65)',
              hoverBackgroundColor: 'rgba(124,92,252,1)',
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: (c) => `${c.parsed.y} jobs` } },
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: colors.text },
              },
              y: {
                grid: { color: colors.grid, display: true },
                border: { display: false },
                beginAtZero: true,
                ticks: { stepSize: 1, color: colors.text },
              },
            }
          }
        });
      } else {
        canvas.parentElement.innerHTML += '<p style="font-size:13px;color:var(--muted);margin-top:8px">No data yet. Trigger a scrape.</p>';
      }

      const errCount = (sum.errors || []).length;
      document.getElementById('summary-content').innerHTML = sum.run_at ? `
        <div class="summary-row"><span>Last run</span><span>${relTime(sum.run_at)}</span></div>
        <div class="summary-row"><span>Jobs discovered</span><span>${sum.jobs_discovered ?? '—'}</span></div>
        <div class="summary-row"><span>Contacts found</span><span>${sum.contacts_found ?? '—'}</span></div>
        <div class="summary-row"><span>Emails drafted</span><span>${sum.emails_drafted ?? '—'}</span></div>
        <div class="summary-row"><span>Errors</span><span>${errCount > 0
          ? `<span class="badge badge-red">${errCount}</span>`
          : '<span class="badge badge-green">None</span>'}</span></div>
      ` : `<div class="empty"><div class="empty-icon">🕐</div><p>No run summary yet. Scheduler hasn't completed a cycle.</p></div>`;
    }

    // ===========================================================================
    // ROUTER
    // ===========================================================================
    function switchTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-view').forEach(s => s.classList.toggle('active', s.id === `tab-${tab}`));
      if (tab === 'jobs')     loadJobs();
      else if (tab === 'contacts') loadContacts();
      else if (tab === 'emails')   loadEmails();
      else if (tab === 'stats')    loadStats();
    }

    // ===========================================================================
    // EVENT WIRING
    // ===========================================================================

    // Theme toggle
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);

    // Tabs
    document.querySelectorAll('.nav-tab').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Jobs filter bar
    document.getElementById('job-search').addEventListener('input', e => {
      state.filters.search = e.target.value;
      renderJobs();
    });
    document.getElementById('job-status-filter').addEventListener('change', e => {
      state.filters.status = e.target.value;
      renderJobs();
    });
    document.getElementById('job-stack-filter').addEventListener('change', e => {
      state.filters.stack = e.target.value;
      renderJobs();
    });
    document.getElementById('btn-refresh-jobs').addEventListener('click', () => loadJobs(true));
    document.getElementById('btn-refresh-contacts').addEventListener('click', () => {
      state.contacts = {};
      loadContacts(true);
    });

    // Jobs grid click delegation
    document.getElementById('jobs-grid').addEventListener('click', e => {
      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        e.stopPropagation();
        const { action, id } = actionBtn.dataset;
        if (action === 'discover') discoverForJob(id);
        else if (action === 'draft') draftForJob(id);
        else if (action === 'apply') markApplied(id);
        return;
      }
      const card = e.target.closest('.job-card');
      if (card) openDetailPanel(card.dataset.id);
    });

    // Detail panel close
    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.getElementById('panel-backdrop').addEventListener('click', closePanel);

    // Contacts table: sort headers + row expand
    document.getElementById('contacts-table').addEventListener('click', e => {
      const th = e.target.closest('th[data-col]');
      if (th) {
        const col = th.dataset.col;
        state.contactSort.dir = (state.contactSort.col === col) ? -state.contactSort.dir : 1;
        state.contactSort.col = col;
        const q = document.getElementById('contact-search').value.trim();
        renderContacts(state.contacts[q || '__all__'] || []);
      }
      const row = e.target.closest('.contact-row');
      if (row) {
        const i = row.dataset.idx;
        const exp = document.getElementById(`cexpand-${i}`);
        if (exp) exp.style.display = exp.style.display === 'none' ? 'table-row' : 'none';
      }
    });

    document.getElementById('contact-search').addEventListener('keydown', e => {
      if (e.key === 'Enter') { state.contacts = {}; loadContacts(true); }
    });

    // Emails: view & send
    document.getElementById('emails-body').addEventListener('click', e => {
      const viewBtn = e.target.closest('.email-view-btn');
      if (viewBtn) {
        const i = viewBtn.dataset.i;
        const exp = document.getElementById(`eexpand-${i}`);
        const row = document.querySelector(`.email-row[data-i="${i}"]`);
        if (exp) {
          const open = exp.style.display !== 'none';
          exp.style.display = open ? 'none' : 'table-row';
          if (row) row.classList.toggle('expanded-parent', !open);
        }
      }
      const sendBtn = e.target.closest('.email-send-btn');
      if (sendBtn) sendEmail(sendBtn.dataset.id, sendBtn.dataset.i);
    });

    // Scrape modal
    const scrapeModal = document.getElementById('scrape-modal');
    document.getElementById('btn-scrape').addEventListener('click',  () => scrapeModal.classList.add('open'));
    document.getElementById('modal-close').addEventListener('click', () => scrapeModal.classList.remove('open'));
    document.getElementById('modal-cancel').addEventListener('click',() => scrapeModal.classList.remove('open'));
    scrapeModal.addEventListener('click', e => { if (e.target === scrapeModal) scrapeModal.classList.remove('open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') scrapeModal.classList.remove('open'); });

    document.getElementById('modal-submit').addEventListener('click', async () => {
      const role  = document.getElementById('scrape-role').value.trim();
      const stack = document.getElementById('scrape-stack').value.split(',').map(s => s.trim()).filter(Boolean);
      if (!role) { toast('Enter a role first', 'error'); return; }
      scrapeModal.classList.remove('open');
      const btn = document.getElementById('modal-submit');
      btn.disabled = true;
      const r = await apiFetch('/scrape', { method: 'POST', body: { role, stack } });
      btn.disabled = false;
      if (r !== null) toast('Scraping started — new jobs will appear in ~60 seconds', 'info', 6000);
    });

    // Offline banner dismiss
    document.getElementById('btn-dismiss-banner').addEventListener('click', hideBanner);

    // ===========================================================================
    // INIT
    // ===========================================================================
    (async () => {
      switchTab('jobs');
    })();
  </script>
</body>
</html>
