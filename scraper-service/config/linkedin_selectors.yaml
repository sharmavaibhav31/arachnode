# LinkedIn Scraper CSS Selectors
# Update this file when LinkedIn changes its frontend
# Last verified: March 2026

linkedin:
  selectors:
    job_card: "li > div.base-search-card"
    title: "h3.base-search-card__title"
    company: "h4.base-search-card__subtitle"
    location: "span.job-search-card__location"
    job_url: "a.base-card__full-link"
    posted_date: "time"
  
  fallbacks:
    job_card_alt: "div.base-search-card"
    title_alt: ".job-card-list__title"
    company_alt: ".job-card-container__company-name"
    