# .env.example
# REQUIRED FOR RUNTIME (Set to strong values)
# JOBHUNTER_API_KEY=change-me-before-deploying
# POSTGRES_USER=jobuser
# POSTGRES_PASSWORD=jobpass
# POSTGRES_DB=jobsdb

# EXTERNAL SERVICES (Required for full functionality)
# GITHUB_TOKEN=ghp_...
# GMAIL_ADDRESS=you@gmail.com
# GMAIL_APP_PASSWORD=xxxx xxxx xxxx xxxx

# JOB SEEKER PROFILE (Customize for your search)
# YOUR_NAME="Applicant Name"
# YOUR_GITHUB_URL="https://github.com/yourusername"
# JOBSEEKER_ROLE="Backend Engineer"
# JOBSEEKER_STACK="Python,FastAPI,PostgreSQL,Redis,Go"

# SYSTEM CONFIGURATION
# CRAWL_INTERVAL_HOURS=8
# DISCOVER_INTERVAL_HOURS=24
# SCRAPER_WAIT_SECS=60
# DISCOVER_DELAY_SECS=30
# FOLLOWUP_DAYS=7
# GATEWAY_PORT=8080
# OLLAMA_BASE_URL=http://host.docker.internal:11434

# Postgres and Redis are intentionally not exposed to the host.
# Use docker exec for direct access during development.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-jobuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpass}
      POSTGRES_DB:       ${POSTGRES_DB:-jobsdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-jobuser} -d $${POSTGRES_DB:-jobsdb}"]
      interval: 5s
      retries: 10
    networks: [jobnet]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks: [jobnet]
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JOBSEEKER_ROLE:  ${JOBSEEKER_ROLE:-Backend Engineer}
      JOBSEEKER_STACK: ${JOBSEEKER_STACK:-Python,FastAPI,PostgreSQL,Redis,Go}
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    networks: [jobnet]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
      interval: 10s
      retries: 5

  aggregator:
    build:
      context: ./aggregator-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobuser}:${POSTGRES_PASSWORD:-jobpass}@postgres:5432/${POSTGRES_DB:-jobsdb}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 15s

  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobuser}:${POSTGRES_PASSWORD:-jobpass}@postgres:5432/${POSTGRES_DB:-jobsdb}
    depends_on:
      redis:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 20s

  contact:
    build:
      context: ./contact-discovery-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobuser}:${POSTGRES_PASSWORD:-jobpass}@postgres:5432/${POSTGRES_DB:-jobsdb}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 25s

  email-gen:
    build:
      context: ./email-generator-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobuser}:${POSTGRES_PASSWORD:-jobpass}@postgres:5432/${POSTGRES_DB:-jobsdb}
      OLLAMA_BASE_URL:    ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GMAIL_ADDRESS:      ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      YOUR_NAME:          ${YOUR_NAME:-Applicant}
      YOUR_GITHUB_URL:    ${YOUR_GITHUB_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 15s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      AGGREGATOR_URL: http://aggregator:8000
      SCRAPER_URL:    http://scraper:8000
      CONTACT_URL:    http://contact:8000
      EMAIL_GEN_URL:  http://email-gen:8000
      SUMMARY_PATH:          /data/run_summary.json
      NOTIFY_CONFIG_PATH:    /data/notify_config.json
      SLACK_WEBHOOK_URL:     ${SLACK_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL:   ${DISCORD_WEBHOOK_URL:-}
      NOTIFICATION_EMAIL:    ${NOTIFICATION_EMAIL:-}
      NOTIFY_RATE_LIMIT_SECS: ${NOTIFY_RATE_LIMIT_SECS:-300}
      SUMMARY_PATH:   /data/run_summary.json
      JOBHUNTER_API_KEY: ${JOBHUNTER_API_KEY:-}
    volumes:
      - run_summary:/data:ro
    depends_on:
      aggregator:
        condition: service_healthy
      scraper:
        condition: service_healthy
      contact:
        condition: service_healthy
      email-gen:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      retries: 5
      start_period: 30s

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL:            http://gateway:8080
      CRAWLER_URL:            http://crawler:8004
      JOBSEEKER_ROLE:         ${JOBSEEKER_ROLE:-Backend Engineer}
      JOBSEEKER_STACK:        ${JOBSEEKER_STACK:-Python,FastAPI,PostgreSQL,Redis,Go}
      CRAWL_INTERVAL_HOURS:   ${CRAWL_INTERVAL_HOURS:-8}
      DISCOVER_INTERVAL_HOURS: ${DISCOVER_INTERVAL_HOURS:-24}
      SCRAPER_WAIT_SECS:      ${SCRAPER_WAIT_SECS:-60}
      DISCOVER_DELAY_SECS:    ${DISCOVER_DELAY_SECS:-30}
      SUMMARY_PATH:           /data/run_summary.json
      # Notification / Webhook config
      SLACK_WEBHOOK_URL:      ${SLACK_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL:    ${DISCORD_WEBHOOK_URL:-}
      NOTIFICATION_EMAIL:     ${NOTIFICATION_EMAIL:-}
      NOTIFY_RATE_LIMIT_SECS: ${NOTIFY_RATE_LIMIT_SECS:-300}
      NOTIFY_EVENTS:          ${NOTIFY_EVENTS:-}
    volumes:
      - run_summary:/data
    depends_on:
      gateway:
        condition: service_healthy
      crawler:
        condition: service_healthy
    networks: [jobnet]
    restart: on-failure

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  run_summary:
    driver: local

networks:
  jobnet:
    driver: bridge
